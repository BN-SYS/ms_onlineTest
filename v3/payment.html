<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 선택 - 멘사 온라인 테스트</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/payment.css">
</head>

<body>
    <!-- 헤더 -->
    <div id="header-placeholder"></div>
    
    <div class="payment-container">

        <div class="payment-header">
            <h1>테스트를 완료하셨습니다!</h1>
            <p class="description">지금 바로 <strong>나의 결과</strong>를 확인하세요</p>
        </div>


        <div class="payment-options">
            <!-- 기본 결과 -->
            <div class="payment-card" onclick="selectPayment('basic')">
                <div class="card-tag">빠른 확인</div>
                <h3>기본 결과</h3>
                
                <div class="price-wrapper">
                    <div class="discount-badge">
                        <span class="discount-percent">25% 할인</span>
                    </div>
                    <div class="original-price">19,900원</div>
                    <div class="price">
                        14,900<small>원</small>
                    </div>
                </div>

                <ul class="benefits-list">
                    <li><strong>종합 점수</strong></li>
                    <li>기본 결과 해석</li>
                    <li>이메일 즉시 발송 (5분 이내)</li>
                </ul>

                <button class="payment-btn" onclick="event.stopPropagation(); processPayment('basic')">
                    <span class="btn-text">지금 바로 결제하고 결과 확인</span>
                </button>
            </div>

            <!-- 상세 리포트 -->
            <div class="payment-card premium" onclick="selectPayment('detail')">
                <div class="most-popular">
                    <span>83%가 선택</span>
                </div>
                <div class="card-tag recommended">전문가 추천</div>
                <h3>상세 리포트</h3>
                
                <div class="price-wrapper">
                    <div class="discount-badge">
                        <span class="discount-percent">40% 할인</span>
                    </div>
                    <div class="original-price">39,900원</div>
                    <div class="price highlight">
                        23,900<small>원</small>
                    </div>
                    <div class="price-description">전문가 수준의 상세 분석</div>
                </div>

                <ul class="benefits-list">
                    <li><strong class="highlight-text">기본 결과 전체 포함</strong></li>
                    <li><strong>영역별 상세 분석</strong></li>
                    <li>전문가 해석 + 분석 그래프</li>
                    <li>고급 PDF 다운로드 (인쇄 가능)</li>
                </ul>

                <div class="value-comparison">
                    <span class="comparison-text">기본 대비 9,000원으로</span>
                    <span class="comparison-value">3배 더 많은 정보</span>
                </div>

                <button class="payment-btn premium-btn" onclick="event.stopPropagation(); processPayment('detail')">
                    <span class="btn-text">상세 리포트로 완벽 분석하기</span>
                </button>
            </div>
        </div>

    </div>

    <!-- 푸터 -->
    <div id="footer-placeholder"></div>

    <!-- include.js 추가 -->
    <script src="js/include.js"></script>
</body>

</html>
